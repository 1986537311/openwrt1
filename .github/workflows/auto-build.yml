name: OpenWrt-Bleach
run-name: Manual Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      TZ: Asia/Shanghai
      TERM: dumb
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison gawk gcc-multilib g++-multilib libncurses-dev libssl-dev git rsync unzip wget

      - name: Clone Source（使用镜像域名规避解析故障）
        run: |
          git config --global http.postBuffer 524288000
          git clone --depth 1 https://mirror.ghproxy.com/https://github.com/bleach85/lede.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config
        run: |
          cd openwrt
          cp ../.config .config
          yes "" | make olddefconfig

      - name: Download Sources
        run: |
          cd openwrt
          make download -j2

      - name: Build Firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          path: openwrt/bin/targets/x86_64
